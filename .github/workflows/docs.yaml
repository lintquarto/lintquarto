name: docs
run-name: Render Quarto website and publish on GitHub pages

on:
  push:
    branches: main
  pull_request:
    branches: main
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Create uv virtualenv
        run: uv venv

      - name: Install dependencies from pyproject.toml
        run: |
          uv pip install -r pyproject.toml --all-extras
          uv pip install --group dev
          # quartodoc compatibility fix: griffe 1.14.0
          uv pip install "griffe==1.14.0"

      - name: Build API docs with quartodoc
        working-directory: docs
        run: uv run quartodoc build

      - name: Quarto render
        working-directory: docs
        run: uv run quarto render

      - name: Quarto publish to gh-pages
        if: github.ref == 'refs/heads/main'
        working-directory: docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          uv run quarto publish gh-pages --no-prompt --no-browser