project:
  type: website
  output-dir: _site
  pre-render: python cli/generate-cli.py
  render:
  - "*.qmd"
  - "!pages/tools/examples"

format:
  html:
    theme: minty
    css:
      - styles/sidebar.css
      - styles/callouts.css

website:
  title: "lintquarto"
  description: "Documentation for the lintquarto python package"
  repo-url: https://github.com/lintquarto/lintquarto
  page-navigation: true
  navbar:
    pinned: true
    search: true
    left:
      - pages/get_started.qmd
      - text: User guide
        href: pages/tools/summary.qmd
      - pages/api/index.qmd
      - text: Contributing
        href: pages/contributing.qmd
      - text: Changelog
        href: pages/changelog.qmd
    right:
      - icon: github
        href: https://github.com/lintquarto/lintquarto
        aria-label: lintquarto GitHub
  sidebar:
    - id: tools
      style: "docked"
      title: "User guide"
      contents:
        - text: "**Summary**"
          href: pages/tools/summary.qmd
        - section: "**Linters**"
          contents:
            - pages/tools/flake8.qmd
            - pages/tools/pycodestyle.qmd
            - pages/tools/pydoclint.qmd
            - pages/tools/pyflakes.qmd
            - pages/tools/pylint.qmd
            - pages/tools/ruff.qmd
        - section: "**Static type checkers**"
          contents:
            - pages/tools/basedpyright.qmd
            - pages/tools/mypy.qmd
            - pages/tools/pyrefly.qmd
            - pages/tools/pyright.qmd
            - pages/tools/pytype.qmd
        - section: "**Code analysis tools**"
          contents:
            - pages/tools/vulture.qmd
            - pages/tools/radon.qmd
        - text: "**Related tools**"
          href: pages/tools/related.qmd

metadata-files:
  - pages/api/_sidebar.yml

quartodoc:
  title: Reference
  dir: pages/api
  out_index: index.qmd
  package: lintquarto
  sections:
    - title: Gathering module
      desc: "Function to gather list of Quarto files."
      contents:
        - gather_qmd_files
    - title: Runner module
      desc: "Functions which run tools: convert to py file, run tool, return output."
      package: lintquarto.runner
      contents:
        - ToolRunner
        - lint_qmd
        - format_qmd
        - temp_py_file
    - title: Converter modules
      desc: "Code to convert Quarto (`.qmd`) files to Python (`.py`) files, preserving line alignment and extracting Python code, with both a command-line interface and callable functions."
      package: lintquarto.convert
      contents:
        - analyse_python.analyse_block
        - analyse_python.find_closing_delimiter_row
        - analyse_python.find_content_node
        - analyse_python.analyse_block_content
        - analyse_python.get_rows
        - analyse_python.handle_option_state_row
        - analyse_python.parse_chunk_eval
        - analyse_python.mark_code_row
        - build_output.OutputBuilder
        - build_output.FormatOutputBuilder
        - build_output.LintOutputBuilder
        - collect_python.collect_python_blocks
        - collect_python.walk_for_python_blocks
        - collect_python.get_language_text
        - converter.QmdToPyConverter
        - converter.convert_qmd_to_py
        - filename.get_unique_filename
        - parse_yaml.find_metadata_node
        - parse_yaml.parse_yaml_eval_from_node
        - rebuild_qmd.recreate_qmd_from_formatted_py
        - rebuild_qmd.parse_formatted_blocks
    - title: Linters module
      desc: "Classes to check for supported and available Python linters, static type checkers, code analysis tools and code formatters on the user's system."
      package: lintquarto.registry
      contents:
        - ToolRegistry
        - Linters
        - Formatters
    - title: CLI module
      desc: "Command-line interface for linting Python code in Quarto (`.qmd`) files, including argument parsing and orchestration of the linting workflow."
      package: lintquarto.main
      contents:
        - main
        - build_parser
        - validate_args
        - validate_no_commas
        - parse_custom_commands
        - list_tools
    - title: Merge module
      desc: "Functions used to merge configuration settings with CLI arguments."
      package: lintquarto.merge
      contents:
        - merge_config
        - _merge_prefer_cli
        - _merge_additive
        - _merge_bool_or
    - title: Config module
      desc: "Support for declaring lintquarto settings in a `pyproject.toml` configuration file."
      package: lintquarto.config
      contents:
        - LintquartoConfig
        - find_pyproject_toml
        - load_config
        - _str_list
        - _bool
    - title: Line length module
      desc: "Class to detect configured line length."
      package: lintquarto.linelength
      contents:
        - LineLengthDetector
    - title: Args module
      desc: "Class which extends `argparse.ArgumentParser` to provide user-friendly error messages and help text when incorrect command-line arguments are supplied."
      package: lintquarto.args
      contents:
        - CustomArgumentParser

